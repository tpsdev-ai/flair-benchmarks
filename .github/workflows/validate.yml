name: Validate benchmark submission

# PR gate ONLY. Never push/workflow_dispatch/schedule — a submission is only
# ever validated in the context of the PR proposing it.
on:
  pull_request:

# Least-privilege: this job only ever reads the repo and computes a diff.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Checkout the PR's actual head commit (not the synthetic merge ref) —
      # reviews exactly what the contributor proposed.
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      # base.sha/head.sha are passed via `env:`, not interpolated directly
      # into the run: script body — no ${{ }} template syntax appears inside
      # any run: block anywhere in this workflow. This is the standard
      # mitigation for script-injection via PR-controlled/event metadata: the
      # value becomes a literal environment variable the shell reads, rather
      # than text spliced into the script before the shell ever parses it.
      - name: Determine changed files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/changed_files.txt
          echo "Changed files in this PR:"
          cat /tmp/changed_files.txt

      # No secrets anywhere in this workflow: schema validation, the
      # forbidden-content sweep, and the naming-convention check are all
      # pure local computation over files already checked out.
      - name: Validate results
        run: node scripts/validate-results.mjs --changed-files /tmp/changed_files.txt
